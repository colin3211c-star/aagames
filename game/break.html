<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1000, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1000px; /* Force the body to be the game's native width */
            height: 100%;
            background-color: #0f172a; 
            display: flex;
            justify-content: center;
            align-items: center;
            /* Prevents the iPad from bouncing the screen when you tap */
            touch-action: none; 
        }

        #game-container {
            width: 1000px;
            height: 768px;
            position: relative;
            /* Using a simple zoom to make it fit the iPad screen visually */
            zoom: 0.8; 
            border: 10px solid #1e293b;
            border-radius: 15px;
            background-color: #000;
        }

        canvas {
            display: block;
            width: 1000px !important;
            height: 768px !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas height="768" id="canvas" width="1000">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js"></script>
    <script>window.onload = GameMaker_Init;</script>

</body>
</html>
