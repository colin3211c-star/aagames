<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #231f20;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Using the EXACT Archer Scaling Fix */
        #unity-container {
            width: 1000px; /* Game native width */
            height: 768px; /* Game native height */
            position: relative;
            /* This math forces iPad to align the click-zone with the graphics */
            transform: scale(calc(min(90vw / 1000, 70vh / 768)));
            transform-origin: center;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
        }
    </style>
</head>
<body>

    <div id="unity-container">
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas height="768" id="canvas" width="1000"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js"></script>
    <script>
        window.onload = function() {
            GameMaker_Init();
        };

        // This prevents the "ghost click" offset on iPads
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
