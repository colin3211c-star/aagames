<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #0f172a; /* Frame color */
            display: flex;
            justify-content: center;
            /* Keeps the game pushed toward the top so it doesn't get cut off */
            align-items: flex-start; 
        }

        #game-container {
            width: 1000px; 
            height: 768px; 
            position: relative;
            /* WIDTH: 85% of screen | HEIGHT: 75% of screen (Clears iPad bar) */
            transform: scale(calc(min(85vw / 1000, 75vh / 768)));
            /* Scales from the top center to keep the top menu visible */
            transform-origin: top center;
            margin-top: 15px; 
            
            border: 5px solid #1e293b;
            border-radius: 10px;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            width: 100% !important;
            height: 100% !important;
        }

        /* Hides GameMaker scrollbars if they appear */
        :-webkit-full-screen #canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas height="768" id="canvas" width="1000">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js"></script>
    <script>window.onload = GameMaker_Init;</script>

</body>
</html>
