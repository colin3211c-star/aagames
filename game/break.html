<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Force the browser to treat touches as clicks immediately */
            touch-action: manipulation;
            cursor: pointer;
        }

        #game-container {
            /* We use the native resolution of the game */
            width: 1000px;
            height: 768px;
            position: relative;
            /* We use CSS Transform but with a specific fix for Safari */
            transform: scale(0.7); 
            transform-origin: center center;
            -webkit-transform: scale(0.7);
            -webkit-transform-origin: center center;
            
            border: 10px solid #1e293b;
            border-radius: 15px;
            background-color: #000;
        }

        canvas {
            display: block;
            /* Prevents the 'long-press' menu from popping up on iPad */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas height="768" id="canvas" width="1000">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js"></script>
    
    <script>
        // This script forces the iPad to recognize a click when you touch
        window.addEventListener('load', function() {
            GameMaker_Init();
            
            const canvas = document.getElementById('canvas');
            canvas.addEventListener('touchstart', function(e) {
                // Prevents the browser from zooming/scrolling
                e.preventDefault(); 
            }, { passive: false });
        });
    </script>
</body>
</html>
