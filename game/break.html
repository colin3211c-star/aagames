<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #0f172a; /* The 'Frame' color around your game */
            display: flex;
            justify-content: center;
            align-items: center; /* Centers the window so top and bottom are safe */
        }

        #game-container {
            width: 1000px; 
            height: 768px; 
            position: relative;
            /* Scale fix: 85% of width, 70% of height for the perfect iPad fit */
            transform: scale(calc(min(85vw / 1000, 70vh / 768)));
            transform-origin: center;
            
            /* Visual Frame Details */
            border: 5px solid #1e293b;
            border-radius: 12px;
            background-color: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            width: 100% !important;
            height: 100% !important;
            border-radius: 5px;
        }

        /* Essential for GameMaker iPad compatibility */
        :-webkit-full-screen #canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas height="768" id="canvas" width="1000">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js"></script>
    <script>window.onload = GameMaker_Init;</script>

</body>
</html>
