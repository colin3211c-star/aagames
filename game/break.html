<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; 
        background-color: #0f172a; /* Dark blue background to act as the 'frame' */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #game-container {
        position: relative;
        width: 1000px;
        height: 768px;
        /* Scales to 80% of the screen so it never touches the edges */
        transform: scale(calc(min(80vw / 1000, 80vh / 768)));
        transform-origin: center;
        
        /* Adds a nice border to make it look like a real game window */
        border: 10px solid #1e293b;
        border-radius: 15px;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
        background-color: #000;
    }

    canvas {
        display: block;
        image-rendering: pixelated;
        border-radius: 5px;
    }
</style>
