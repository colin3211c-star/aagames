<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #0f172a; 
            display: flex;
            justify-content: center;
            align-items: center; 
        }

        #game-container {
            width: 1000px; 
            height: 768px; 
            position: relative;
            
            /* FIXED SCALE: This ignores the iPad's height logic and forces a small size */
            /* This is roughly 50% of the original size */
            transform: scale(0.5); 
            transform-origin: center;
            
            /* Visual Frame */
            border: 15px solid #1e293b;
            border-radius: 20px;
            background-color: #000;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas height="768" id="canvas" width="1000">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js"></script>
    <script>window.onload = GameMaker_Init;</script>

</body>
</html>
