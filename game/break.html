<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="no-cache" http-equiv="pragma">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
    <meta content="black-translucent" name="apple-mobile-web-app-status-bar-style">
    
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">

    <style>
        /* --- HOME BUTTON STYLE START --- */
        .home-button {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999; /* Ensures it stays on top of the game */
            background-color: #1e293b;
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            opacity: 0.7;
            transition: opacity 0.3s, background-color 0.3s;
        }

        .home-button:hover {
            opacity: 1.0;
            background-color: #334155;
        }
        /* --- HOME BUTTON STYLE END --- */

        body {
            background: #000000;
            color:#cccccc;
            margin: 0px;
            padding: 0px;
            border: 0px;
            overflow: hidden;
        }
        canvas {
            image-rendering: optimizeSpeed;
            -webkit-interpolation-mode: nearest-neighbor;
            -ms-touch-action: none;
            margin: 0px;
            padding: 0px;
            border: 0px;
            width: 100vw;
            height: 100vh;
        }
        div.gm4html5_div_class {
            margin: 0px;
            padding: 0px;
            border: 0px;
        }
    </style>
</head>

<body dir="ltr">
    <a href="../index.html" class="home-button">🏠 Back to Classroom</a>

    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas height="768" id="canvas" width="1000" style="cursor: auto;">
            <p>Your browser doesn't support HTML5 canvas.</p>
        </canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js" type="text/javascript"></script>
    <script>window.onload = GameMaker_Init;</script>

</body>
</html>
