<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Idle Breakout</title>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Stops scrolling */
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This fixes the "Game doesn't fit" issue */
        #gm4html5_div_id {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw !important;
            max-height: 100vh !important;
            width: auto !important;
            height: auto !important;
            image-rendering: pixelated; /* Keeps it looking sharp */
            -webkit-interpolation-mode: nearest-neighbor;
            display: block;
        }
    </style>
</head>

<body>
    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas height="768" id="canvas" width="1000">
            <p>Your browser doesn't support HTML5 canvas.</p>
        </canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js"></script>
    <script>window.onload = GameMaker_Init;</script>
</body>
</html>
