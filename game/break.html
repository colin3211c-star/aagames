<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; 
        background-color: #000;
        display: flex;
        justify-content: center;
        /* Aligns the container to the top so we can see the stats */
        align-items: flex-start; 
    }

    #game-container {
        position: relative;
        width: 1000px;
        height: 768px;
        /* 70vh makes it a bit shorter for a better fit */
        transform: scale(calc(min(90vw / 1000, 70vh / 768)));
        /* This is the secret: keep the top locked in place */
        transform-origin: top center;
        margin-top: 20px; 
    }

    canvas {
        display: block;
        image-rendering: pixelated;
    }
</style>
