<!DOCTYPE html>
<html lang="en-US">
<head>
    <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gdlite/">
    <title>Geometry Dash</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <link rel="stylesheet" href="themes/geometrydashlite.io/rs/css/home.css?v=1">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents the page from scrolling away from the game */
            background: #000; /* Solid black background looks better if scaling occurs */
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            /* This ensures the game maintains its shape but never goes off-screen */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #loader {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            z-index: 99;
        }

        .logo {
            max-width: 80%;
            height: auto;
        }
    </style>
</head>

<body>
    <div id="gameContainer"></div>
    
    <div id="loader">
        <img class="logo" src="image/loading.png?v=1">
        <div class="spinner"></div>
        <div class="pos_progress">
            <div class="progress">
                <div class="posfull"><img class="full" src="image/process_bar_back.png"></div>
                <div class="posbox"><img class="box_process" src="image/process_bar_front.png"></div>
            </div>
        </div>
    </div>

    <script>
      window.fileMergerConfig = {
        files: [
          { name: 'GeometryDashLite.data.unityweb', parts: 2 },
          { name: 'GeometryDashLite.wasm.code.unityweb', parts: 1 },
          { name: 'GeometryDashLite.wasm.framework.unityweb', parts: 1 },
        ],
        basePath: 'Build/',
        debug: false
      };  
    </script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@ac5cdfc0042aca584e72619375b4aca948a9243c/merge.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", {
            onProgress: UnityProgress
        });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) return;
            const loader = document.querySelector("#loader");
            if (!gameInstance.progress) {
                const progressUI = document.querySelector("#loader .progress");
                progressUI.style.display = "block";
                gameInstance.progress = progressUI.querySelector(".full");
                loader.querySelector(".spinner").style.display = "none";
            }
            gameInstance.progress.style.transform = `scaleX(${progress})`;
            if (progress === 1 && !gameInstance.removeTimeout) {
                gameInstance.removeTimeout = setTimeout(function() {
                    loader.style.display = "none";
                }, 2000);
            }
        }
    </script>
</body>
</html>
