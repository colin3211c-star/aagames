<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Arcade</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--accent);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #334155;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
        }

        .game-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }

        .game-title {
            font-size: 1.25rem;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        .game-desc {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        footer {
            margin-top: 50px;
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🕹️ My Arcade</h1>
        <p>All games here support auto-saving progress!</p>
    </header>

    <main class="game-grid">
        <a href="game/break.html" class="game-card">
            <span class="game-icon">🧱</span>
            <span class="game-title">Idle Breakout</span>
            <span class="game-desc">Break bricks and upgrade. Progress saves automatically!</span>
        </a>
        <a href="archers/phantom.html" class="game-card">
            <span class="game-icon">🏹</span>
            <span class="game-title">Archers</span>
            <span class="game-desc">Use the arrows to kill the enemy</span>
        </a>


        </main>

    <footer>
        &copy; 2026 My Game Site | Hosted on GitHub Pages
    </footer>

</body>
</html>
