<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            display: none; /* Hide everything until password is correct */
            text-align: center;
            padding-top: 50px;
        }
        .game-link {
            display: block;
            margin: 20px;
            color: #38bdf8;
            text-decoration: none;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <h1>My Games</h1>
    <a href="game/break.html" class="game-link">Idle Breakout</a>
    <a href="game/archer.html" class="game-link">Ragdoll Archers</a>
    <a href="game/geo.html" class="game-link">Geometry Dash</a>

    <script>
        // 1. LIST ALL YOUR PASSWORDS HERE
        const validPasswords = ["777", "math", "apple", "1234"];

        function checkAccess() {
            // Check if they already logged in this session
            if (sessionStorage.getItem("loggedIn") === "true") {
                document.body.style.display = "block";
                return;
            }

            const password = prompt("Please enter the access code:");

            // 2. Check if the typed password is in our list
            if (validPasswords.includes(password)) {
                sessionStorage.setItem("loggedIn", "true");
                document.body.style.display = "block";
            } else {
                alert("Access Denied");
                window.location.href = "https://google.com";
            }
        }

        checkAccess();
    </script>
</body>
</html>
