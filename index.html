<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Classroom</title>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* THE LOCK SCREEN */
        #password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f172a; z-index: 10000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .login-card { background: #1e293b; padding: 40px; border-radius: 15px; border: 2px solid #38bdf8; text-align: center; }
        input { padding: 15px; border-radius: 8px; border: 1px solid #334155; background: #000; color: white; font-size: 20px; width: 220px; margin-bottom: 20px; }
        button { padding: 12px 30px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* THE ACTUAL CONTENT (Hidden until unlocked) */
        #main-content { display: none; width: 100%; max-width: 600px; text-align: center; }
        .game-card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; border: 1px solid #334155; text-decoration: none; color: inherit; display: block; }
        .config-link { margin-top: 40px; color: #475569; text-decoration: none; font-size: 0.8rem; opacity: 0.4; display: block; }
    </style>
</head>
<body>

    <div id="password-overlay">
        <div class="login-card">
            <h2 style="color: #38bdf8; margin-bottom: 20px;">🔒 Enter Access Code</h2>
            <input type="password" id="user-pass" placeholder="Password">
            <br>
            <button onclick="verify()">Unlock Arcade</button>
        </div>
    </div>

    <div id="main-content">
        <h1>🕹️ My Arcade</h1>
        <a href="game/break.html" class="game-card">
            <div style="font-size: 3rem;">🧱</div>
            <div style="font-size: 1.5rem; font-weight: bold;">Idle Breakout</div>
        </a>
        <a href="game/rag.html" class="game-card">
            <div style="font-size: 3rem;">🏹</div>
            <div style="font-size: 1.5rem; font-weight: bold;">Archers</div>
        </a>
        <a href="game/dash.html" class="game-card">
            <div style="font-size: 3rem;">📐</div>
            <div style="font-size: 1.5rem; font-weight: bold;">Geometry Dash</div>
        </a>
        <a href="game/settings-config.html" class="config-link">System_Config_v1.0.4</a>
    </div>

    <script>
        function verify() {
            const val = document.getElementById('user-pass').value;
            if (val === "gP5SrggL") {
                // Hide lock, show games
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                alert("Incorrect Password");
                window.location.href = "https://www.google.com";
            }
        }

        // Fix for iPad 'Enter' key
        document.getElementById('user-pass').addEventListener("keypress", function(e) {
            if (e.key === "Enter") { verify(); }
        });
    </script>
</body>
</html>
