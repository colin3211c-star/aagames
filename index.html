<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #gm4html5_div_id {
            display: none; /* Hidden until password is correct */
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas height="768" id="canvas" width="1000">
            <p>Your browser doesn't support HTML5 canvas.</p>
        </canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js"></script>
    
    <script>
        // 1. ADD YOUR PASSWORDS HERE
        const validPasswords = ["gP5SrggL", "w-reck", "secret77"];

        function checkPassword() {
            const userEntry = prompt("Enter Access Code:");
            
            // 2. This checks if the entered text is in your list
            if (validPasswords.includes(userEntry)) {
                document.getElementById("gm4html5_div_id").style.display = "block";
                GameMaker_Init();
            } else {
                alert("Incorrect Password");
                window.location.href = "https://classroom.google.com"; // Sends them away
            }
        }

        window.onload = checkPassword;
    </script>

</body>
</html>
